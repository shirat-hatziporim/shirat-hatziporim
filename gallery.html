<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>צימר שירת הציפורים — גלריה</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;700;900&family=Heebo:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --dark:#0d0d0d;
  --cream:#f5f0e8;
  --gold:#c8a97e;
  --text:#1a1a1a;
}
body{
  font-family:'Heebo',sans-serif;
  background:var(--cream);
  color:var(--text);
  min-height:100vh;
}

/* HEADER */
header{
  background:var(--dark);
  padding:2rem 1.5rem;
  text-align:center;
  position:relative;
}
.logo{
  width:70px;height:70px;
  border-radius:50%;object-fit:cover;
  border:2px solid var(--gold);
  margin-bottom:1rem;
}
header h1{
  font-family:'Frank Ruhl Libre',serif;
  font-size:clamp(1.6rem,4vw,2.4rem);
  color:#fff;
  font-weight:700;
  margin-bottom:0.25rem;
}
header p{color:rgba(255,255,255,.5);font-size:14px;}

/* NAV TABS */
.tabs{
  display:flex;justify-content:center;gap:0;
  background:#fff;
  border-bottom:2px solid #e8e0d0;
  flex-wrap:wrap;
}
.tab{
  padding:14px 24px;
  font-size:14px;font-weight:600;
  font-family:'Heebo',sans-serif;
  cursor:pointer;border:none;background:none;
  color:#888;transition:all .2s;
  border-bottom:2px solid transparent;
  margin-bottom:-2px;
}
.tab:hover{color:var(--text);}
.tab.active{color:var(--dark);border-bottom-color:var(--gold);}

/* SECTIONS */
.section{display:none;padding:1.5rem;}
.section.active{display:block;}

/* GALLERY GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:12px;
  max-width:1100px;margin:0 auto;
}
.grid-item{
  border-radius:12px;overflow:hidden;
  aspect-ratio:4/3;
  cursor:pointer;
  transition:transform .2s,box-shadow .2s;
  background:#ddd;
}
.grid-item:hover{transform:scale(1.02);box-shadow:0 8px 32px rgba(0,0,0,.15);}
.grid-item img{width:100%;height:100%;object-fit:cover;display:block;}
.grid-item.wide{grid-column:span 2;}

/* VIDEO */
.video-wrap{
  max-width:800px;margin:0 auto;
  border-radius:16px;overflow:hidden;
  box-shadow:0 8px 40px rgba(0,0,0,.12);
}
video{width:100%;display:block;}

/* PDF */
.pdf-card{
  max-width:500px;margin:0 auto;
  background:#fff;border-radius:16px;
  padding:2rem;text-align:center;
  box-shadow:0 4px 20px rgba(0,0,0,.08);
}
.pdf-icon{font-size:56px;margin-bottom:1rem;}
.pdf-title{font-size:18px;font-weight:700;margin-bottom:0.5rem;font-family:'Frank Ruhl Libre',serif;}
.pdf-sub{font-size:13px;color:#888;margin-bottom:1.5rem;}
.btn-pdf{
  display:inline-block;
  background:var(--dark);color:var(--gold);
  padding:12px 28px;border-radius:10px;
  font-size:15px;font-weight:700;
  text-decoration:none;font-family:'Heebo',sans-serif;
  transition:all .2s;
}
.btn-pdf:hover{background:#222;transform:translateY(-2px);}

.price-img{
  max-width:600px;margin:0 auto;display:block;
  border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.1);
}

/* LIGHTBOX */
.lightbox{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.92);z-index:1000;
  align-items:center;justify-content:center;
  flex-direction:column;
}
.lightbox.open{display:flex;}
.lightbox img{
  max-width:94vw;max-height:88vh;
  object-fit:contain;border-radius:8px;
}
.lb-close{
  position:absolute;top:20px;right:20px;
  color:#fff;font-size:32px;cursor:pointer;
  background:none;border:none;line-height:1;
}
.lb-nav{
  position:absolute;top:50%;transform:translateY(-50%);
  color:#fff;font-size:40px;cursor:pointer;
  background:rgba(255,255,255,.1);border:none;
  width:50px;height:80px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s;
}
.lb-nav:hover{background:rgba(255,255,255,.2);}
.lb-prev{left:12px;}
.lb-next{right:12px;}
.lb-counter{color:rgba(255,255,255,.6);font-size:13px;margin-top:12px;}

/* CONTACT */
.contact{
  max-width:500px;margin:0 auto;
  background:#fff;border-radius:16px;
  padding:2rem;text-align:center;
  box-shadow:0 4px 20px rgba(0,0,0,.08);
}
.contact h3{font-family:'Frank Ruhl Libre',serif;font-size:22px;margin-bottom:1rem;}
.contact p{color:#666;font-size:14px;line-height:1.7;margin-bottom:1.5rem;}
.btn-wa{
  display:inline-flex;align-items:center;gap:8px;
  background:#25d366;color:#fff;
  padding:13px 28px;border-radius:10px;
  font-size:15px;font-weight:700;
  text-decoration:none;font-family:'Heebo',sans-serif;
  transition:all .2s;
}
.btn-wa:hover{background:#1ebe5d;transform:translateY(-2px);}

footer{
  text-align:center;padding:2rem;
  font-size:12px;color:#aaa;
  background:var(--dark);margin-top:3rem;
}
</style>
</head>
<body>

<header>
  <img src="https://shirat-hatziporim.github.io/shirat-hatziporim/logo.jpeg" class="logo" onerror="this.style.display='none'">
  <h1>צימר שירת הציפורים</h1>
  <p>גלריה ומידע</p>
</header>

<div class="tabs">
  <button class="tab active" onclick="showTab('photos')">📸 תמונות</button>
  <button class="tab" onclick="showTab('video')">🎬 סרטון</button>
  <button class="tab" onclick="showTab('brochure')">📄 חוברת מידע</button>
  <button class="tab" onclick="showTab('price')">💰 מחירון</button>
  <button class="tab" onclick="showTab('contact')">📞 יצירת קשר</button>
</div>

<!-- תמונות -->
<div id="tab-photos" class="section active">
  <div class="grid" id="photoGrid"></div>
</div>

<!-- סרטון -->
<div id="tab-video" class="section">
  <div class="video-wrap">
    <video controls poster="https://shirat-hatziporim.github.io/shirat-hatziporim/1תמונה ראשית.jpeg">
      <source src="https://shirat-hatziporim.github.io/shirat-hatziporim/סרטון צימר.mp4" type="video/mp4">
      הדפדפן שלך לא תומך בסרטון.
    </video>
  </div>
</div>

<!-- חוברת -->
<div id="tab-brochure" class="section">
  <div class="pdf-card">
    <div class="pdf-icon">📋</div>
    <div class="pdf-title">חוברת מידע — צימר שירת הציפורים</div>
    <div class="pdf-sub">כל המידע על הצימר, האמנויות והכללים</div>
    <a href="https://shirat-hatziporim.github.io/shirat-hatziporim/חוברת מידע צימר שירת הציפורים.pdf" target="_blank" class="btn-pdf">פתח חוברת PDF ↗</a>
  </div>
</div>

<!-- מחירון -->
<div id="tab-price" class="section">
  <img src="https://shirat-hatziporim.github.io/shirat-hatziporim/מחירון צימר.jpeg" class="price-img" alt="מחירון צימר שירת הציפורים">
</div>

<!-- יצירת קשר -->
<div id="tab-contact" class="section">
  <div class="contact">
    <h3>צרו קשר</h3>
    <p>נשמח לענות על כל שאלה ולעזור בהזמנה<br>יעקב גרזון | 050-4103353</p>
    <a href="https://wa.me/972504103353" class="btn-wa" target="_blank">
      💬 שלח WhatsApp
    </a>
    <br><br>
    <a href="https://shirat-hatziporim.github.io/shirat-hatziporim/booking.html" style="display:inline-block;margin-top:8px;padding:12px 24px;background:var(--dark);color:var(--gold);border-radius:10px;font-weight:700;text-decoration:none;font-family:'Heebo',sans-serif;">
      📅 הזמנה אונליין
    </a>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" onclick="closeLB()">✕</button>
  <button class="lb-nav lb-prev" onclick="navLB(-1)">‹</button>
  <img id="lbImg" src="" alt="">
  <button class="lb-nav lb-next" onclick="navLB(1)">›</button>
  <div class="lb-counter" id="lbCounter"></div>
</div>

<footer>
  צימר שירת הציפורים | נחל קדם 93, מיצד | 050-4103353
</footer>

<script>
const BASE = "https://shirat-hatziporim.github.io/shirat-hatziporim/";
const PHOTOS = [
  "1תמונה ראשית.jpeg",
  "2סלון.jpeg",
  "3סלון.jpeg",
  "4חדר שינה4.jpeg",
  "5גקוזי5.jpeg",
  "5מקלחון.jpeg",
  "6מקלחון6.jpeg",
  "7מקלחת7.jpeg",
  "8פינת קפה8.jpeg",
  "9חצר9.jpeg",
  "10חצר10.jpeg",
  "11חצר11.jpeg",
  "12נוף12.jpeg",
  "13נוף13.jpeg",
];

let lbIndex = 0;

function buildGallery(){
  const grid = document.getElementById("photoGrid");
  PHOTOS.forEach((f, i) => {
    const div = document.createElement("div");
    div.className = "grid-item" + (i===0?" wide":"");
    const img = document.createElement("img");
    img.src = BASE + encodeURIComponent(f);
    img.alt = f;
    img.loading = "lazy";
    div.appendChild(img);
    div.onclick = () => openLB(i);
    grid.appendChild(div);
  });
}

function openLB(i){
  lbIndex = i;
  document.getElementById("lbImg").src = BASE + encodeURIComponent(PHOTOS[i]);
  document.getElementById("lbCounter").textContent = (i+1) + " / " + PHOTOS.length;
  document.getElementById("lightbox").classList.add("open");
}
function closeLB(){ document.getElementById("lightbox").classList.remove("open"); }
function navLB(dir){
  lbIndex = (lbIndex + dir + PHOTOS.length) % PHOTOS.length;
  openLB(lbIndex);
}
document.getElementById("lightbox").addEventListener("click", function(e){
  if(e.target === this) closeLB();
});
document.addEventListener("keydown", e => {
  if(e.key === "Escape") closeLB();
  if(e.key === "ArrowLeft") navLB(1);
  if(e.key === "ArrowRight") navLB(-1);
});

function showTab(name){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById("tab-"+name).classList.add("active");
  event.target.classList.add("active");
}

buildGallery();
</script>
</body>
</html>
