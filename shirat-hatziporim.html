// ── מחירון ──
function isSummer(ds){const md=ds.slice(5);return md>="06-01"&&md<="08-31";}
function isWeekend(ds){const d=new Date(ds);return d.getDay()===5||d.getDay()===6;}
const HOLIDAYS=["2025-04-12","2025-04-13","2025-04-14","2025-04-18","2025-04-19","2025-06-01","2025-06-02","2025-09-22","2025-09-23","2025-09-24","2025-09-25","2025-10-01","2025-10-02","2025-10-06","2025-10-07","2025-10-13","2025-10-14"];
function isHoliday(ds){return HOLIDAYS.includes(ds);}
function getActivePrices(){
  try{
    const s=localStorage.getItem("shirat_prices");
    return s?JSON.parse(s):DEFAULT_PRICES;
  }catch{return DEFAULT_PRICES;}
}
function getDailyPrice(ds){
  const p=getActivePrices();
  const w=isWeekend(ds)||isHoliday(ds);
  return w?p.weekend:p.weekday;
}
function getDayType(ds){if(isHoliday(ds))return"חג";if(isWeekend(ds))return'סופ"ש';return"חול";}
function calcNights(a,b){
  a=parseDate(a);b=parseDate(b);
  return Math.max(0,Math.round((new Date(b)-new Date(a))/86400000));
}

function hasPackageDeal(checkin,checkout){
  // חבילת חמישי+שישי+שבת — כניסה חמישי יציאה שבת/ראשון
  const cin=new Date(checkin);
  const cout=new Date(checkout);
  const nights=Math.round((cout-cin)/86400000);
  const cinDay=cin.getDay(); // 4=חמישי
  // כניסה חמישי ולפחות 2 לילות (חמישי+שישי)
  if(cinDay===4&&nights>=2){
    return true;
  }
  return false;
}

function calcTotal(checkin,checkout,extra=0){
  checkin=parseDate(checkin);checkout=parseDate(checkout);
  const nights=calcNights(checkin,checkout);
  if(!nights)return{total:0,nights:0,breakdown:[],guestExtra:0,packageDeal:false,sundayExtra:0};

  const cout=new Date(checkout);
  const coutDay=cout.getDay(); // 0=ראשון
  const activePrices=getActivePrices();
  const sundayExtra=coutDay===0?activePrices.sundayExtra:0; // תוספת יציאה ראשון

  // בדוק חבילת חמישי+שישי+שבת
  const pkg=hasPackageDeal(checkin,checkout);

  let base=0;const bd=[];

  if(pkg){
    // חבילה: חמישי+שישי+שבת = 1700 קבוע
    // חשב לילות מחוץ לחבילה
    const cur=new Date(checkin);
    let pkgNights=0;
    let extraNights=0;
    for(let i=0;i<nights;i++){
      const day=cur.getDay();
      if(pkgNights<2||(pkgNights===2&&day===6)){
        // חמישי, שישי, שבת — חלק מהחבילה
        if(pkgNights<3) pkgNights++;
      } else {
        extraNights++;
        const ds=cur.toISOString().split("T")[0];
        const p=getDailyPrice(ds);
        bd.push({date:ds,price:p,type:getDayType(ds)});
        base+=p;
      }
      cur.setDate(cur.getDate()+1);
    }
    // הוסף חבילה
    const pkgDays=["חמישי","שישי","שבת"];
    const cur2=new Date(checkin);
    for(let i=0;i<Math.min(3,nights);i++){
      const ds=cur2.toISOString().split("T")[0];
      bd.unshift({date:ds,price:Math.round(1700/3),type:"חבילה"});
      cur2.setDate(cur2.getDate()+1);
    }
    base+=activePrices.packageDeal;
  } else {
    const cur=new Date(checkin);
    for(let i=0;i<nights;i++){
      const ds=cur.toISOString().split("T")[0];
      const p=getDailyPrice(ds);
      bd.push({date:ds,price:p,type:getDayType(ds)});
      base+=p;
      cur.setDate(cur.getDate()+1);
    }
  }

  const guestExtra=Math.max(0,extra)*(activePrices.extraGuest||300);
  const total=base+guestExtra+sundayExtra;
  return{total,nights,breakdown:bd,guestExtra,packageDeal:pkg,sundayExtra};
}
function parseDate(ds){
  if(!ds)return null;
  // אם התאריך מכיל T (ISO format) - קח רק את חלק התאריך
  if(typeof ds==="string"&&ds.includes("T")) ds=ds.split("T")[0];
  return ds;
}
function fd(ds){
  if(!ds)return"";
  ds=parseDate(ds);
  if(!ds)return"";
  const [y,m,d]=ds.split("-");
  return `${d}.${m}.${y}`;
}

function jsonp(url){
  return new Promise((resolve,reject)=>{
    const cb="cb_"+Math.random().toString(36).slice(2);
    let done=false;
    window[cb]=function(data){
      if(done)return;done=true;
      resolve(data);
      delete window[cb];
      try{document.head.removeChild(s);}catch(e){}
    };
    const s=document.createElement("script");
    s.src=url+(url.includes("?")?"&":"?")+"callback="+cb+"&t="+Date.now();
    s.onerror=()=>{
      if(done)return;done=true;
      reject(new Error("jsonp error"));
      delete window[cb];
    };
    setTimeout(()=>{
      if(!done){done=true;reject(new Error("jsonp timeout"));delete window[cb];}
    },10000);
    document.head.appendChild(s);
  });
}

    email:b.email||"",
    checkin:parseDate(b.checkin)||b.checkin,

  };
}

async function saveToSheets(bookings){
  // שמירה מקומית תמיד
  try{localStorage.setItem("shirat_bookings",JSON.stringify(bookings));}catch(e){}
  // שמירה לגוגל שיטס — שליחה בחלקים אם צריך
  try{
    const str=JSON.stringify(bookings);
    // אם קצר מספיק — שלח ישירות
    if(str.length<3000){
      await jsonp(`${SCRIPT_URL}?action=save&bookings=${encodeURIComponent(str)}`);
    } else {
      // שלח בחלקים
      const parts=Math.ceil(str.length/2000);
      for(let i=0;i<parts;i++){
        const chunk=str.slice(i*2000,(i+1)*2000);
        await jsonp(`${SCRIPT_URL}?action=chunk&index=${i}&total=${parts}&data=${encodeURIComponent(chunk)}`);
      }
      await jsonp(`${SCRIPT_URL}?action=commitChunks`);
    }
  }catch(e){console.error("שגיאה בסנכרון:",e);}
}

  const custom=localStorage.getItem("shirat_review_template")||"";
  const {subject,body}=buildReviewEmail(b,custom||null);
  window.open(`https://mail.google.com/mail/?view=cm&to=${encodeURIComponent(b.email)}&su=${subject}&body=${body}`,"_blank");
}

function checkReminders(bookings){
  const today=new Date().toISOString().split("T")[0];
  const tomorrow=new Date();tomorrow.setDate(tomorrow.getDate()+1);
  const tomorrowStr=tomorrow.toISOString().split("T")[0];
  // יום ההגעה
  const todayArrivals=bookings.filter(b=>b.status!=="cancelled"&&b.checkin===today);
  // יום לפני
  const tomorrowArrivals=bookings.filter(b=>b.status!=="cancelled"&&b.checkin===tomorrowStr);
  return{todayArrivals,tomorrowArrivals};
}

function guestType(b){
  const extra=parseInt(b.extraGuests)||0;
  const babies=parseInt(b.babies)||0;
  if(extra===0&&babies===0) return "זוג";
  if(extra===0&&babies>0) return `זוג + ${babies===1?"תינוק":"תינוקות"}`;
  if(extra>0&&babies===0) return `זוג + ${extra}`;
  return `זוג + ${extra} + ${babies===1?"תינוק":"תינוקות"}`;
}

// ── Calendar ──
function CalendarView({bookings,onEdit,blockedDates=[],onToggleBlock}){
  const today=new Date();
  const [vd,setVd]=useState(new Date(today.getFullYear(),today.getMonth(),1));
  const yr=vd.getFullYear(),mo=vd.getMonth();
  const firstDay=new Date(yr,mo,1).getDay(),dim=new Date(yr,mo+1,0).getDate();
  const occ={};
  blockedDates.forEach(bd=>{
    const ds=bd.date&&bd.date.includes("T")?bd.date.split("T")[0]:(bd.date||"");
    if(ds)(occ[ds]=occ[ds]||[]).push({name:`🔒 ${bd.note||"חסום"}`,_blocked:true});
  });
  bookings.filter(b=>b.status!=="cancelled").forEach(b=>{
    const checkin=parseDate(b.checkin);
    const checkout=parseDate(b.checkout);
    if(!checkin||!checkout)return;
    const cur=new Date(checkin+"T12:00:00");
    const end=new Date(checkout+"T12:00:00");
    const checkoutDay=end.getDay();
    // אם יום היציאה הוא שבת (6) — סמן גם אותו תפוס
    if(checkoutDay!==6) end.setDate(end.getDate()-1);
    while(cur<=end){
      const ds=cur.getFullYear()+"-"+String(cur.getMonth()+1).padStart(2,"0")+"-"+String(cur.getDate()).padStart(2,"0");
      (occ[ds]=occ[ds]||[]).push(b);
      cur.setDate(cur.getDate()+1);
    }
  });
  const cells=[];for(let i=0;i<firstDay;i++)cells.push(null);for(let d=1;d<=dim;d++)cells.push(d);
  return(
    <div style={{background:"#fff",borderRadius:20,padding:22,boxShadow:"0 4px 24px rgba(0,0,0,.07)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
        <button onClick={()=>setVd(new Date(yr,mo+1,1))} style={{border:"none",background:"#f8f4ec",borderRadius:8,width:34,height:34,cursor:"pointer",fontSize:15,color:"#3d2c1e",fontWeight:700}}>→</button>
        <h3 style={{margin:0,fontSize:17,color:"#1a1a2e"}}>{MONTHS_HE[mo]} {yr}</h3>
        <button onClick={()=>setVd(new Date(yr,mo-1,1))} style={{border:"none",background:"#f8f4ec",borderRadius:8,width:34,height:34,cursor:"pointer",fontSize:15,color:"#3d2c1e",fontWeight:700}}>←</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:4}}>
        {DAYS_HE.map(d=><div key={d} style={{textAlign:"center",fontSize:11,fontWeight:700,color:"#a09080",padding:"3px 0"}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
        {cells.map((d,i)=>{
          if(!d)return <div key={i}/>;
          const ds=`${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
          const booked=occ[ds],isToday=ds===today.toISOString().split("T")[0],p=getDailyPrice(ds);
          return(
            <div key={ds} onClick={()=>{
                if(booked&&booked[0]._blocked){onToggleBlock&&onToggleBlock(ds,'remove');}
                else if(booked){onEdit(booked[0]);}
                else{onToggleBlock&&onToggleBlock(ds,'add');}
              }} title={booked?(booked[0]._blocked?"לחץ לשחרר חסימה":"לחץ לעריכה"):"לחץ לחסימה"}
              style={{borderRadius:9,padding:"5px 3px",textAlign:"center",cursor:"pointer",background:booked?"#1a1a2e":isToday?"#f0eee8":"transparent",border:isToday&&!booked?"2px solid #c8b898":"2px solid transparent",minHeight:46,transition:"opacity .15s"}}
              onMouseEnter={e=>{if(booked)e.currentTarget.style.opacity=".8";}}
              onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
              <div style={{fontSize:13,fontWeight:isToday?800:400,color:booked?"#fff":"#3d2c1e"}}>{d}</div>
              {booked
                ?<div style={{fontSize:9,color:booked[0]._blocked?"#ffccbc":"#f4c26a",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",padding:"0 2px"}}>{booked[0].name}</div>
                :<div style={{fontSize:9,color:"#b0a090"}}>{fm(p)}</div>
              }
            </div>
          );
        })}
      </div>
      <div style={{marginTop:14,paddingTop:12,borderTop:"1px solid #f0eee8",display:"flex",gap:20,flexWrap:"wrap"}}>
        {[["#1a1a2e","תפוס"],["#f0eee8","היום"],["transparent","פנוי + מחיר"]].map(([c,l])=>(
          <div key={l} style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{width:14,height:14,borderRadius:4,background:c,border:c==="transparent"?"1.5px solid #c8b898":"none"}}/>
            <span style={{fontSize:12,color:"#8a7e6e"}}>{l}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

  function save(b){
    let updated;
    if(b.id&&bookings.find(x=>x.id===b.id)) updated=bookings.map(x=>x.id===b.id?b:x);
    else updated=[...bookings,b];
    setBookings(updated);
    syncSave(updated);
    setShowForm(false);setEditB(null);

  }
  function openEdit(b){setEditB(b);setShowForm(true);}
  function deleteB(id){const updated=bookings.filter(b=>b.id!==id);setBookings(updated);syncSave(updated);setDelC(null);}

  const confirmed=bookings.filter(b=>b.status==="confirmed");
  const totalRev=confirmed.reduce((s,b)=>s+(b.total||0),0);
  const totalPaid=confirmed.reduce((s,b)=>s+(b.paid||0),0);
  const totalNights=confirmed.reduce((s,b)=>s+(b.nights||0),0);

  if(!auth) return <LoginScreen onLogin={()=>{sessionStorage.setItem("shirat_auth","1");setAuth(true);}}/>;

  if(loading) return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"linear-gradient(160deg,#faf7f2,#f0ece3)",direction:"rtl"}}>
      <img src="https://shirat-hatziporim.github.io/shirat-hatziporim/logo.jpeg" style={{width:100,height:100,borderRadius:"50%",objectFit:"cover",background:"#fff",padding:6,boxShadow:"0 4px 20px rgba(0,0,0,0.1)",marginBottom:16}}/>
      <div style={{fontSize:20,fontWeight:800,color:"#1a1a2e",marginBottom:8,fontFamily:"'Heebo',sans-serif"}}>שירת הציפורים</div>
      <div style={{fontSize:14,color:"#8a7e6e",fontFamily:"'Heebo',sans-serif",marginBottom:24}}>טוען הזמנות מ־Google Sheets...</div>
      <div style={{width:40,height:40,border:"4px solid #e0d8cc",borderTop:"4px solid #1a1a2e",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",direction:"rtl"}}>
      {/* Header */}
      <div style={{background:"#1a1a2e",padding:"0 20px",position:"sticky",top:0,zIndex:50}}>
        <div style={{maxWidth:1100,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center",minHeight:48,flexWrap:"wrap",gap:4,padding:"4px 0"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <img src="https://shirat-hatziporim.github.io/shirat-hatziporim/logo.jpeg" style={{height:36,width:36,borderRadius:"50%",objectFit:"cover",background:"#fff",padding:2}}/><span style={{color:"#fff",fontSize:16,fontWeight:800,marginRight:8}}>שירת הציפורים</span>
            <span style={{color:"#5a5878",fontSize:12,borderRight:"1px solid #3a3a5e",paddingRight:10}}>ניהול הזמנות</span>
            {syncing
              ? <span style={{fontSize:11,color:"#f4c26a",fontFamily:"'Heebo',sans-serif"}}>⏳ שומר...</span>
              : lastSync && <span style={{fontSize:11,color:"#4a6a4a",fontFamily:"'Heebo',sans-serif"}}>✅ מסונכרן</span>
            }
            <button onClick={()=>{
              setLoading(true);
              Promise.all([loadFromSheets(),loadBlocked(),loadExpenses()]).then(([data,blocked,expenses])=>{
                setBookings(data);setBlockedDates(blocked);setExpenses(expenses);
                setLoading(false);setLastSync(new Date());
              });
            }} style={{border:"none",background:"none",color:"#6a6090",fontSize:14,cursor:"pointer",padding:"2px 6px"}} title="רענן נתונים">🔄</button>
          </div>
          <div className="desktop-btns" style={{display:"flex",gap:8}}>
            <button onClick={()=>setShowBlockedManager(true)} style={{background:"#252545",color:"#ff8a65",border:"1px solid #3a3a6e",borderRadius:8,padding:"6px 12px",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"'Heebo',sans-serif"}}>🔒 חסימות</button>
            <button onClick={()=>setShowExpenses(true)} style={{background:"#252545",color:"#a5d6a7",border:"1px solid #3a3a6e",borderRadius:8,padding:"6px 12px",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"'Heebo',sans-serif"}}>💸 הוצאות</button>
            <button onClick={()=>{setPriceTab('view');setShowPriceEditor(true);}} style={{background:"#252545",color:"#f4c26a",border:"1px solid #3a3a6e",borderRadius:8,padding:"6px 12px",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"'Heebo',sans-serif"}}><span class="btn-text">📋 <span class="btn-text">מחירון</span></span><span style={{display:"none"}} className="btn-icon">📋</span></button>
            <button onClick={()=>setShowInquiry(true)} style={{background:"#252545",color:"#a5d6a7",border:"1px solid #3a3a6e",borderRadius:8,padding:"6px 12px",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"'Heebo',sans-serif"}}>📨 <span class="btn-text">מייל מתעניינים</span></button>
            <button onClick={()=>{setEmailEditorType("confirm");setShowEmailEditor(true);}} style={{background:"#252545",color:"#ce93d8",border:"1px solid #3a3a6e",borderRadius:8,padding:"6px 12px",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"'Heebo',sans-serif"}}>📝 <span class="btn-text">עריכת מיילים</span></button>
          </div>
          <button onClick={()=>{setEditB(null);setShowForm(true);}} style={{background:"#f4c26a",color:"#1a1a2e",border:"none",borderRadius:10,padding:"7px 12px",fontWeight:800,fontSize:14,cursor:"pointer",fontFamily:"'Heebo',sans-serif",whiteSpace:"nowrap"}}>+ הזמנה</button>
          {/* המבורגר - נייד בלבד */}
          <button className="hamburger-btn" onClick={()=>setHamburgerOpen(true)}
            style={{border:"none",background:"none",color:"#fff",fontSize:24,cursor:"pointer",display:"none",padding:"4px 8px"}}>
            ☰
          </button>
        </div>
      </div>

      {/* תפריט המבורגר */}
      {hamburgerOpen&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:300,display:"flex",justifyContent:"flex-start"}}
          onClick={()=>setHamburgerOpen(false)}>
          <div onClick={e=>e.stopPropagation()}
            style={{background:"#1a1a2e",width:"75vw",maxWidth:280,height:"100%",padding:"24px 16px",direction:"rtl",display:"flex",flexDirection:"column",gap:12,overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <span style={{color:"#fff",fontSize:16,fontWeight:800,fontFamily:"'Heebo',sans-serif"}}>תפריט</span>
              <button onClick={()=>setHamburgerOpen(false)} style={{border:"none",background:"none",color:"#aaa",fontSize:22,cursor:"pointer"}}>✕</button>
            </div>
            {[
              {icon:"📋",label:"מחירון",action:()=>{setPriceTab("view");setShowPriceEditor(true);}},
              {icon:"📨",label:"מייל מתעניינים",action:()=>setShowInquiry(true)},
              {icon:"📝",label:"עריכת מיילים",action:()=>{setEmailEditorType("confirm");setShowEmailEditor(true);}},
            ].map(({icon,label,action})=>(
              <button key={label} onClick={()=>{action();setHamburgerOpen(false);}}
                style={{background:"#252545",color:"#f4c26a",border:"1px solid #3a3a6e",borderRadius:10,padding:"12px 16px",fontFamily:"'Heebo',sans-serif",fontWeight:700,fontSize:14,cursor:"pointer",textAlign:"right",display:"flex",alignItems:"center",gap:10}}>
                <span>{icon}</span><span>{label}</span>
              </button>
            ))}
          </div>
        </div>
      )}

      {/* Price popup */}
      {showPrices&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setShowPrices(false)}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:20,padding:26,width:"min(340px,94vw)",boxShadow:"0 24px 80px rgba(0,0,0,.2)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <h3 style={{margin:0,color:"#1a1a2e",fontSize:17}}>מחירון שירת הציפורים</h3>
              <button onClick={()=>setShowPrices(false)} style={{border:"none",background:"none",fontSize:20,cursor:"pointer",color:"#aaa"}}>✕</button>
            </div>
            {[
              {l:"אמצע שבוע (א-ה)",p:fm(getActivePrices().weekday)},
              {l:'שישי–שבת / חג',p:fm(getActivePrices().weekend)},
              {l:"חבילה חמישי+שישי+שבת",p:fm(getActivePrices().packageDeal)},
              {l:"תוספת יציאה ראשון",p:fm(getActivePrices().sundayExtra)},
              {l:"אורח נוסף (מעל 2)",p:`${fm(getActivePrices().extraGuest)} / אדם`},
              {l:"תינוק",p:"ללא תשלום"},
            ].map(r=>(
              <div key={r.l} style={{display:"flex",justifyContent:"space-between",padding:"9px 0",borderBottom:"1px solid #f0eee8"}}>
                <span style={{color:"#5a4e40",fontSize:14}}>{r.l}</span>
                <span style={{fontWeight:800,color:"#1a1a2e"}}>{r.p}</span>
              </div>
            ))}
            <div style={{marginTop:12,paddingTop:12,borderTop:"1px solid #e0d8cc"}}>
              <div style={{fontSize:13,color:"#7a6a58"}}>⏰ כניסה: 13:00 · יציאה: 11:00</div>
              <div style={{fontSize:13,color:"#7a6a58",marginTop:3}}>📞 050-410-3353 יעקב</div>
              <div style={{fontSize:13,color:"#7a6a58",marginTop:3}}>📍 נחל קדם 93, מיצד (אספר)</div>
            </div>
          </div>
        </div>
      )}

      <div style={{maxWidth:1100,margin:"0 auto",padding:"20px 12px"}}>
        {/* Stats */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>
          {[
            {l:"מאושרות",v:confirmed.length,icon:"📋",s:`${bookings.filter(b=>b.status==="pending").length} ממתינות`},
            {l:"לילות מוזמנים",v:totalNights,icon:"🌙",s:'סה"כ'},
            {l:"הכנסות צפויות",v:fm(totalRev),icon:"💰",s:"מאושרות"},
            {l:"יתרה לגביה",v:fm(totalRev-totalPaid),icon:"📊",s:`שולם: ${fm(totalPaid)}`},
          ].map((s,i)=>(
            <div key={i} style={{background:"#fff",borderRadius:10,padding:"8px 10px",boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}>
              <div style={{fontSize:14}}>{s.icon}</div>
              <div style={{fontSize:14,fontWeight:800,color:"#1a1a2e",marginTop:1}}>{s.v}</div>
              <div style={{fontSize:10,color:"#6a5e50",marginTop:1}}>{s.l}</div>
              <div style={{fontSize:9,color:"#a09080"}}>{s.s}</div>
            </div>
          ))}
        </div>

        {/* Tabs */}
        <div style={{display:"flex",gap:8,marginBottom:16}}>
          {[["list","📋 רשימה"],["calendar","📅 יומן"],["reports","📊 דוחות"]].map(([k,l])=>(
            <button key={k} onClick={()=>setView(k)} style={{padding:"7px 14px",borderRadius:10,border:"none",cursor:"pointer",background:view===k?"#1a1a2e":"#fff",color:view===k?"#fff":"#5a4e40",fontWeight:view===k?700:500,fontSize:14,fontFamily:"'Heebo',sans-serif",boxShadow:"0 2px 8px rgba(0,0,0,.07)"}}>{l}</button>
          ))}
        </div>

        {/* ── List ── */}
        {view==="list"&&(
          <>
            <div style={{display:"flex",gap:10,marginBottom:12,flexWrap:"wrap"}}>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="חיפוש שם / טלפון..."
                style={{padding:"7px 12px",borderRadius:10,border:"1.5px solid #e0d8cc",fontSize:14,fontFamily:"'Heebo',sans-serif",width:190,background:"#fff",direction:"rtl"}}/>
              <select value={fStatus} onChange={e=>setFStatus(e.target.value)}
                style={{padding:"7px 12px",borderRadius:10,border:"1.5px solid #e0d8cc",fontSize:14,fontFamily:"'Heebo',sans-serif",background:"#fff"}}>
                <option value="all">כל הסטטוסים</option><option value="confirmed">מאושר</option><option value="pending">ממתין</option><option value="cancelled">מבוטל</option>
              </select>
            </div>
            <div style={{background:"#fff",borderRadius:20,overflow:"hidden",boxShadow:"0 4px 24px rgba(0,0,0,.07)"}}>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                  <thead>
                    <tr style={{background:"#f8f4ec"}}>
                      {['שם','טלפון','כניסה','יציאה','לילות','אורחים','סטטוס','סה"כ','שולם','יתרה',''].map(h=>(
                        <th key={h} style={{padding:"10px 12px",textAlign:"right",fontWeight:700,color:"#5a4e40",borderBottom:"1.5px solid #eee6d8",whiteSpace:"nowrap",fontFamily:"'Heebo',sans-serif"}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {!filtered.length&&<tr><td colSpan={11} style={{textAlign:"center",padding:28,color:"#aaa"}}>אין הזמנות</td></tr>}
                    {filtered.sort((a,b)=>a.checkin.localeCompare(b.checkin)).map(b=>{
                      const sc=SC[b.status],bal=Math.max(0,(b.total||0)-(b.paid||0));
                      return(
                        <tr key={b.id} style={{borderBottom:"1px solid #f4f0ea",transition:"background .1s",cursor:"pointer",background:b.checkin===new Date().toISOString().split("T")[0]?"#e3f2fd":"transparent"}}
                          onMouseEnter={e=>e.currentTarget.style.background=b.checkin===new Date().toISOString().split("T")[0]?"#bbdefb":"#fdfaf6"}
                          onMouseLeave={e=>e.currentTarget.style.background=b.checkin===new Date().toISOString().split("T")[0]?"#e3f2fd":"transparent"}
                          onClick={()=>{if(window.innerWidth<700)setMobileActionMenu(b);}}>
                          <td style={{padding:"11px 12px"}}>
                            <div style={{fontWeight:700,color:"#1a1a2e"}}>{b.name}</div>
                            {b.notes&&<div style={{fontSize:11,color:"#a09080",marginTop:2}}>{b.notes}</div>}
                          </td>
                          <td style={{padding:"11px 12px",color:"#6a5e50",direction:"ltr"}}>{b.phone}</td>
                          <td style={{padding:"11px 12px",color:"#6a5e50",whiteSpace:"nowrap"}}>{fd(b.checkin)}</td>
                          <td style={{padding:"11px 12px",color:"#6a5e50",whiteSpace:"nowrap"}}>{fd(b.checkout)}</td>
                          <td style={{padding:"11px 12px",color:"#6a5e50",textAlign:"center"}}>{b.nights||calcNights(b.checkin,b.checkout)}</td>
                          <td style={{padding:"11px 12px",color:"#6a5e50",textAlign:"center"}}>{(b.guests||2)+(b.extraGuests||0)}{b.babies>0?` + ${b.babies}👶`:""}</td>
                          <td style={{padding:"11px 12px"}}>
                            <span style={{background:sc.bg,color:sc.text,borderRadius:8,padding:"3px 9px",fontSize:11,fontWeight:700,display:"inline-flex",alignItems:"center",gap:4}}>
                              <span style={{width:6,height:6,borderRadius:"50%",background:sc.dot,display:"inline-block"}}/>
                              {STATUS[b.status]}
                            </span>
                          </td>
                          <td style={{padding:"11px 12px",fontWeight:700,color:"#1a1a2e"}}>{fm(b.total||0)}</td>
                          <td style={{padding:"11px 12px",color:"#2e7d32",fontWeight:600}}>{fm(b.paid||0)}</td>
                          <td style={{padding:"11px 12px",color:bal>0?"#c62828":"#2e7d32",fontWeight:600}}>{fm(bal)}</td>
                          <td className="desktop-actions" style={{padding:"11px 12px"}}>
                            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                              <button onClick={e=>{e.stopPropagation();openEdit(b);}} style={{border:"none",background:"#f0eee8",borderRadius:7,padding:"5px 10px",cursor:"pointer",fontSize:13}} title="עריכה">✏️</button>
                              <button onClick={()=>sendWhatsApp(b)} style={{border:"none",background:"#e7f7e7",borderRadius:7,padding:"5px 10px",cursor:"pointer",fontSize:13}} title="שלח WhatsApp">💬</button>

                              <button onClick={()=>sendConfirmEmail(b)} style={{border:"none",background:"#e3f2fd",borderRadius:7,padding:"5px 10px",cursor:"pointer",fontSize:13}} title="מייל אישור הזמנה">📧</button>
                              <button onClick={()=>sendReviewEmail(b)} style={{border:"none",background:"#f3e5f5",borderRadius:7,padding:"5px 10px",cursor:"pointer",fontSize:13}} title="מייל בקשת ביקורת">⭐</button>
                              <button onClick={()=>setDelC(b.id)} style={{border:"none",background:"#fce4ec",borderRadius:7,padding:"5px 10px",cursor:"pointer",fontSize:13}} title="מחיקה">🗑️</button>
                            </div>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          </>
        )}

        {/* ── Calendar ── */}
        {view==="calendar"&&<CalendarView bookings={bookings} onEdit={openEdit} blockedDates={blockedDates} onToggleBlock={(ds,action)=>{
              if(action==="add"){
                const nb=[...blockedDates,{date:ds,note:""}];
                setBlockedDates(nb);saveBlocked(nb).then(()=>loadBlocked().then(d=>{if(d.length>0)setBlockedDates(d);}));
              } else {
                const nb=blockedDates.filter(b=>b.date!==ds);
                setBlockedDates(nb);saveBlocked(nb).then(()=>loadBlocked().then(d=>setBlockedDates(d)));
              }
            }}/>}

        {/* ── Reports ── */}
        {view==="reports"&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
            <div style={{background:"#fff",borderRadius:20,padding:22,boxShadow:"0 4px 24px rgba(0,0,0,.07)",gridColumn:"1/-1"}}>
              <h3 style={{margin:"0 0 16px",color:"#1a1a2e",fontWeight:800}}>סיכום כספי</h3>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
                {[{l:"הכנסות צפויות",v:fm(totalRev),c:"#1a1a2e"},{l:"שולם",v:fm(totalPaid),c:"#2e7d32"},{l:"יתרה לגביה",v:fm(totalRev-totalPaid),c:"#c62828"}].map((s,i)=>(
                  <div key={i} style={{background:"#f8f4ec",borderRadius:14,padding:"14px 16px"}}>
                    <div style={{fontSize:20,fontWeight:800,color:s.c}}>{s.v}</div>
                    <div style={{fontSize:13,color:"#7a6a58",marginTop:3}}>{s.l}</div>
                  </div>
                ))}
              </div>
            </div>
            <div style={{background:"#fff",borderRadius:20,padding:22,boxShadow:"0 4px 24px rgba(0,0,0,.07)"}}>
              <h3 style={{margin:"0 0 14px",color:"#1a1a2e",fontWeight:800}}>לפי סטטוס</h3>
              {["confirmed","pending","cancelled"].map(s=>{
                const cnt=bookings.filter(b=>b.status===s).length,pct=bookings.length?Math.round(cnt/bookings.length*100):0;
                return(
                  <div key={s} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                    <span style={{minWidth:60,color:SC[s].text,fontWeight:700,fontSize:13}}>{STATUS[s]}</span>
                    <div style={{flex:1,background:"#f0eee8",borderRadius:6,height:9,overflow:"hidden"}}>
                      <div style={{width:`${pct}%`,background:SC[s].dot,height:"100%",borderRadius:6}}/>
                    </div>
                    <span style={{color:"#6a5e50",fontSize:13}}>{cnt}</span>
                  </div>
                );
              })}
            </div>
                        {/* ⚠️ התראת מקדמה */}
            {bookings.filter(b=>b.status==="confirmed"&&(b.paid||0)<500&&b.checkin>=new Date().toISOString().split("T")[0]).length>0&&(
              <div style={{background:"#fff3e0",borderRadius:20,padding:20,boxShadow:"0 4px 24px rgba(0,0,0,.07)",gridColumn:"1/-1",border:"2px solid #ff9800"}}>
                <h3 style={{margin:"0 0 12px",color:"#e65100",fontWeight:800,fontFamily:"'Heebo',sans-serif"}}>⚠️ מקדמה לא שולמה</h3>
                {bookings.filter(b=>b.status==="confirmed"&&(b.paid||0)<500&&b.checkin>=new Date().toISOString().split("T")[0]).map(b=>(
                  <div key={b.id} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #ffe0b2",fontFamily:"'Heebo',sans-serif",cursor:"pointer"}} onClick={()=>openEdit(b)}>
                    <span style={{fontWeight:700,color:"#1a1a2e"}}>{b.name}</span>
                    <span style={{color:"#e65100",fontSize:13}}>כניסה: {fd(b.checkin)} · שולם: {fm(b.paid||0)}</span>
                  </div>
                ))}
              </div>
            )}
            {/* 📅 הזמנות השבוע */}
            <div style={{background:"#fff",borderRadius:20,padding:20,boxShadow:"0 4px 24px rgba(0,0,0,.07)",gridColumn:"1/-1"}}>
              <h3 style={{margin:"0 0 12px",color:"#1a1a2e",fontWeight:800,fontFamily:"'Heebo',sans-serif"}}>📅 הזמנות השבוע</h3>
              {(()=>{
                const today=new Date();const weekEnd=new Date(today);weekEnd.setDate(weekEnd.getDate()+7);
                const todayStr=today.toISOString().split("T")[0];const weekStr=weekEnd.toISOString().split("T")[0];
                const thisWeek=bookings.filter(b=>b.status!=="cancelled"&&((b.checkin>=todayStr&&b.checkin<=weekStr)||(b.checkout>=todayStr&&b.checkout<=weekStr)));
                if(!thisWeek.length) return <p style={{color:"#a09080",fontFamily:"'Heebo',sans-serif",fontSize:14}}>אין הזמנות בשבוע הקרוב</p>;
                return thisWeek.sort((a,b)=>a.checkin.localeCompare(b.checkin)).map(b=>(
                  <div key={b.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid #f0eee8",fontFamily:"'Heebo',sans-serif",cursor:"pointer"}} onClick={()=>openEdit(b)}>
                    <div>
                      <div style={{fontWeight:700,color:"#1a1a2e"}}>{b.name}</div>

                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* 📱 תפריט המבורגר */}
      {hamburgerOpen&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:300,display:"flex",justifyContent:"flex-start"}}
          onClick={()=>setHamburgerOpen(false)}>
          <div onClick={e=>e.stopPropagation()}
            style={{background:"#1a1a2e",width:"75vw",maxWidth:280,height:"100%",padding:"24px 16px",direction:"rtl",display:"flex",flexDirection:"column",gap:10,overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <span style={{color:"#fff",fontSize:16,fontWeight:800,fontFamily:"'Heebo',sans-serif"}}>תפריט</span>
              <button onClick={()=>setHamburgerOpen(false)} style={{border:"none",background:"none",color:"#aaa",fontSize:22,cursor:"pointer"}}>✕</button>
            </div>
            {[
              {icon:"📋",label:"מחירון",action:()=>{setPriceTab("view");setShowPriceEditor(true);}},

              {icon:"🔒",label:"חסימת תאריכים",action:()=>setShowBlockedManager(true)},
              {icon:"💸",label:"מעקב הוצאות",action:()=>setShowExpenses(true)},
              {icon:"📨",label:"מייל מתעניינים",action:()=>setShowInquiry(true)},
              {icon:"📝",label:"עריכת מיילים",action:()=>{setEmailEditorType("confirm");setShowEmailEditor(true);}},
            ].map(({icon,label,action})=>(
              <button key={label} onClick={()=>{action();setHamburgerOpen(false);}}
                style={{background:"#252545",color:"#f4c26a",border:"1px solid #3a3a6e",borderRadius:10,padding:"12px 16px",fontFamily:"'Heebo',sans-serif",fontWeight:700,fontSize:14,cursor:"pointer",textAlign:"right",display:"flex",alignItems:"center",gap:10}}>
                <span>{icon}</span><span style={{color:"#fff"}}>{label}</span>
              </button>
            ))}
          </div>
        </div>
      )}

      {/* תפריט פעולות נייד */}
      {mobileActionMenu&&(
        <div style={{position:"fixed",inset:0,background:"rgba(20,20,35,.5)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}
          onClick={()=>setMobileActionMenu(null)}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:500,padding:"20px 20px 32px",direction:"rtl"}}>
            <div style={{textAlign:"center",marginBottom:16}}>
              <div style={{width:40,height:4,background:"#e0d8cc",borderRadius:2,margin:"0 auto 12px"}}/>
              <div style={{fontFamily:"'Heebo',sans-serif",fontWeight:800,color:"#1a1a2e",fontSize:16}}>{mobileActionMenu.name}</div>
              <div style={{fontFamily:"'Heebo',sans-serif",color:"#8a7e6e",fontSize:13}}>{fd(mobileActionMenu.checkin)} — {fd(mobileActionMenu.checkout)}</div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              {[
                {icon:"✏️",label:"עריכה",color:"#f0eee8",tc:"#1a1a2e",action:()=>{openEdit(mobileActionMenu);setMobileActionMenu(null);}},
                {icon:"💬",label:"WhatsApp",color:"#e7f7e7",tc:"#2e7d32",action:()=>{sendWhatsApp(mobileActionMenu);setMobileActionMenu(null);}},
                {icon:"📧",label:"אישור הזמנה",color:"#e3f2fd",tc:"#1565c0",action:()=>{sendConfirmEmail(mobileActionMenu);setMobileActionMenu(null);}},
                {icon:"⭐",label:"בקשת ביקורת",color:"#f3e5f5",tc:"#7b1fa2",action:()=>{sendReviewEmail(mobileActionMenu);setMobileActionMenu(null);}},
                {icon:"🗑️",label:"מחיקה",color:"#fce4ec",tc:"#c62828",action:()=>{setDelC(mobileActionMenu.id);setMobileActionMenu(null);}},
              ].map(({icon,label,color,tc,action})=>(
                <button key={label} onClick={action}
                  style={{background:color,color:tc,border:"none",borderRadius:12,padding:"14px 10px",cursor:"pointer",fontFamily:"'Heebo',sans-serif",fontWeight:700,fontSize:14,display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
                  <span style={{fontSize:24}}>{icon}</span><span>{label}</span>
                </button>
              ))}
            </div>
          </div>
        </div>
      )}

            {/* 🔒 מנהל חסימות */}
      {showBlockedManager&&(
        <div style={{position:"fixed",inset:0,background:"rgba(20,20,35,.55)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{background:"#fff",borderRadius:20,width:"min(480px,96vw)",maxHeight:"90vh",overflowY:"auto",boxShadow:"0 24px 80px rgba(0,0,0,.22)",direction:"rtl",padding:"24px 28px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <h2 style={{margin:0,fontSize:19,fontFamily:"'Heebo',sans-serif",color:"#1a1a2e",fontWeight:800}}>🔒 חסימת תאריכים</h2>
              <button onClick={()=>setShowBlockedManager(false)} style={{border:"none",background:"none",fontSize:22,cursor:"pointer",color:"#aaa"}}>✕</button>
            </div>
            <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
              <input type="date" value={newBlockDate} onChange={e=>setNewBlockDate(e.target.value)}
                style={{padding:"8px 12px",borderRadius:10,border:"1.5px solid #e0d8cc",fontSize:14,flex:1}}/>
              <input value={newBlockNote} onChange={e=>setNewBlockNote(e.target.value)}
                placeholder="סיבה" style={{padding:"8px 12px",borderRadius:10,border:"1.5px solid #e0d8cc",fontSize:14,flex:2,fontFamily:"'Heebo',sans-serif"}}/>
              <button onClick={()=>{
                if(!newBlockDate)return;
                const nb=[...blockedDates,{date:newBlockDate,note:newBlockNote}];
                setBlockedDates(nb);
                saveBlocked(nb).then(()=>loadBlocked().then(d=>{if(d.length>0)setBlockedDates(d);}));
                setNewBlockDate("");setNewBlockNote("");
              }} style={{padding:"8px 16px",borderRadius:10,border:"none",background:"#1a1a2e",color:"#fff",fontFamily:"'Heebo',sans-serif",fontWeight:700,cursor:"pointer"}}>הוסף</button>
            </div>
            {blockedDates.length===0&&<p style={{color:"#a09080",fontFamily:"'Heebo',sans-serif",fontSize:14}}>אין תאריכים חסומים</p>}
            {[...blockedDates].sort((a,b)=>a.date.localeCompare(b.date)).map((bd,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid #f0eee8"}}>
                <div>
                  <div style={{fontWeight:700,color:"#1a1a2e",fontFamily:"'Heebo',sans-serif"}}>{fd(bd.date)}</div>
                  {bd.note&&<div style={{fontSize:12,color:"#8a7e6e",fontFamily:"'Heebo',sans-serif"}}>{bd.note}</div>}
                </div>
                <button onClick={()=>{const nb=blockedDates.filter((_,j)=>j!==i);setBlockedDates(nb);saveBlocked(nb).then(()=>loadBlocked().then(d=>setBlockedDates(d)));}}
                  style={{border:"none",background:"#fce4ec",borderRadius:7,padding:"5px 10px",cursor:"pointer",color:"#c62828",fontFamily:"'Heebo',sans-serif",fontWeight:700}}>הסר</button>
              </div>
            ))}
          </div>
        </div>
      )}

      {delC&&(
        <div style={{position:"fixed",inset:0,background:"rgba(20,20,35,.5)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{background:"#fff",borderRadius:16,padding:26,textAlign:"center",maxWidth:280,boxShadow:"0 16px 60px rgba(0,0,0,.2)"}}>
            <div style={{fontSize:34,marginBottom:8}}>🗑️</div>
            <h3 style={{margin:"0 0 6px"}}>מחיקת הזמנה</h3>
            <p style={{color:"#6a5e50",margin:"0 0 16px",fontSize:13}}>פעולה זו אינה הפיכה.</p>
            <div style={{display:"flex",gap:8,justifyContent:"center"}}>
              <button onClick={()=>deleteB(delC)} style={bS("#c62828","#fff")}>מחיקה</button>
              <button onClick={()=>setDelC(null)} style={bS("#f0eee8","#555")}>ביטול</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
