    // הוסף חבילה
    const pkgDays=["חמישי","שישי","שבת"];
    const cur2=new Date(checkin);
    for(let i=0;i<Math.min(3,nights);i++){

function jsonp(url){
  return new Promise((resolve,reject)=>{
    const cb="cb_"+Math.random().toString(36).slice(2);
    let done=false;
    window[cb]=function(data){
      if(done)return;done=true;
      resolve(data);
      delete window[cb];
      try{document.head.removeChild(s);}catch(e){}
    };
    const s=document.createElement("script");
    s.src=url+(url.includes("?")?"&":"?")+"callback="+cb+"&t="+Date.now()+"&authuser=0";
    s.onerror=()=>{
      if(done)return;done=true;
      reject(new Error("jsonp error"));
      delete window[cb];
    };
    setTimeout(()=>{
      if(!done){done=true;reject(new Error("jsonp timeout"));delete window[cb];}
    },10000);
    document.head.appendChild(s);
  });
}

async function saveToSheets(bookings){
  // שמירה מקומית תמיד
  try{localStorage.setItem("shirat_bookings",JSON.stringify(bookings));}catch(e){}
  // שמירה לגוגל שיטס — שליחה בחלקים אם צריך
  try{
    const str=JSON.stringify(bookings);
    // אם קצר מספיק — שלח ישירות
    if(str.length<3000){
      await jsonp(`${SCRIPT_URL}?action=save&bookings=${encodeURIComponent(str)}`);
    } else {
      // שלח בחלקים
      const parts=Math.ceil(str.length/2000);
      for(let i=0;i<parts;i++){
        const chunk=str.slice(i*2000,(i+1)*2000);
        await jsonp(`${SCRIPT_URL}?action=chunk&index=${i}&total=${parts}&data=${encodeURIComponent(chunk)}`);
      }
      await jsonp(`${SCRIPT_URL}?action=commitChunks`);
    }
  }catch(e){console.error("שגיאה בסנכרון:",e);}
}

function BookingForm({booking,onSave,onCancel,existingBookings=[],blockedDates=[]}){
  const empty={name:"",phone:"",checkin:"",checkout:"",guests:2,extraGuests:0,status:"confirmed",notes:"",paid:0};

    if(f.checkin&&f.checkout&&f.checkin<f.checkout)return calcTotal(f.checkin,f.checkout,parseInt(f.extraGuests)||0);
    return{total:0,nights:0,breakdown:[],guestExtra:0,packageDeal:false,sundayExtra:0};
  },[f.checkin,f.checkout,f.extraGuests]);
  const total=Math.max(0,baseTotal-(parseInt(f.discount)||0));
  function validate(){
    const e={};
    if(!f.name.trim())e.name="חובה";
    if(!f.checkin)e.checkin="חובה";
    if(!f.checkout)e.checkout="חובה";
    if(f.checkin&&f.checkout&&f.checkin>=f.checkout)e.checkout="יציאה אחרי כניסה";
    // בדיקת חפיפה עם הזמנות קיימות
    if(f.checkin&&f.checkout&&f.checkin<f.checkout){
      const conflict=existingBookings.find(b=>{
        if(b.id===f.id) return false;
        if(b.status==="cancelled") return false;
        return f.checkin<b.checkout && f.checkout>b.checkin;
      });
      if(conflict) e.checkin=`תאריכים תפוסים! (${conflict.name})`;
      // בדיקת חפיפה עם תאריכים חסומים
      if(!e.checkin){
        const cur=new Date(f.checkin);
        const end=new Date(f.checkout);
        while(cur<end){
          const ds=cur.toISOString().split("T")[0];
          const blocked=blockedDates.find(b=>b.date===ds);
          if(blocked){e.checkin=`תאריך ${fd(ds)} חסום${blocked.note?` (${blocked.note})`:""}`;break;}
          cur.setDate(cur.getDate()+1);
        }
      }
    }
    setErr(e);return!Object.keys(e).length;

  function save(){if(!validate())return;onSave({...f,total,nights,guestExtra,discount:discount||0,id:f.id||nid++});}

              <div><Lbl>שם מלא{err.name&&<span style={{color:"#e53935"}}> — {err.name}</span>}</Lbl><input style={iS(err.name)} value={f.name} onChange={e=>set("name",e.target.value)}/></div>

// ── Calendar ──
function CalendarView({bookings,onEdit,blockedDates=[],onToggleBlock}){
  const today=new Date();
  const [vd,setVd]=useState(new Date(today.getFullYear(),today.getMonth(),1));
  const yr=vd.getFullYear(),mo=vd.getMonth();
  const firstDay=new Date(yr,mo,1).getDay(),dim=new Date(yr,mo+1,0).getDate();
  const occ={};
  blockedDates.forEach(bd=>{
    const ds=bd.date&&bd.date.includes("T")?bd.date.split("T")[0]:(bd.date||"");
    if(ds)(occ[ds]=occ[ds]||[]).push({name:`🔒 ${bd.note||"חסום"}`,_blocked:true});
  });
  bookings.filter(b=>b.status!=="cancelled").forEach(b=>{
    const checkin=parseDate(b.checkin);
    const checkout=parseDate(b.checkout);
    if(!checkin||!checkout)return;
    const cur=new Date(checkin+"T12:00:00");
    const end=new Date(checkout+"T12:00:00");
    const checkoutDay=end.getDay();
    // אם יום היציאה הוא שבת (6) — סמן גם אותו תפוס
    if(checkoutDay!==6) end.setDate(end.getDate()-1);
    while(cur<=end){
      const ds=cur.getFullYear()+"-"+String(cur.getMonth()+1).padStart(2,"0")+"-"+String(cur.getDate()).padStart(2,"0");
      (occ[ds]=occ[ds]||[]).push(b);
      cur.setDate(cur.getDate()+1);
    }
  });
  const cells=[];for(let i=0;i<firstDay;i++)cells.push(null);for(let d=1;d<=dim;d++)cells.push(d);
  return(
    <div style={{background:"#fff",borderRadius:20,padding:22,boxShadow:"0 4px 24px rgba(0,0,0,.07)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
        <button onClick={()=>setVd(new Date(yr,mo+1,1))} style={{border:"none",background:"#f8f4ec",borderRadius:8,width:34,height:34,cursor:"pointer",fontSize:15,color:"#3d2c1e",fontWeight:700}}>→</button>
        <h3 style={{margin:0,fontSize:17,color:"#1a1a2e"}}>{MONTHS_HE[mo]} {yr}</h3>
        <button onClick={()=>setVd(new Date(yr,mo-1,1))} style={{border:"none",background:"#f8f4ec",borderRadius:8,width:34,height:34,cursor:"pointer",fontSize:15,color:"#3d2c1e",fontWeight:700}}>←</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:4}}>
        {DAYS_HE.map(d=><div key={d} style={{textAlign:"center",fontSize:11,fontWeight:700,color:"#a09080",padding:"3px 0"}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
        {cells.map((d,i)=>{
          if(!d)return <div key={i}/>;
          const ds=`${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
          const booked=occ[ds],isToday=ds===today.toISOString().split("T")[0],p=getDailyPrice(ds);
          const holiday=isHoliday(ds);
          return(
            <div key={ds} onClick={()=>{
                if(booked&&booked[0]._blocked){onToggleBlock&&onToggleBlock(ds,'confirm');}
                else if(booked){onEdit(booked[0]);}
                else{onToggleBlock&&onToggleBlock(ds,'add');}
              }} title={booked?(booked[0]._blocked?"🔓 לחץ לשחרור החסימה":"✏️ לחץ לעריכת ההזמנה"):holiday?"🕍 חג — "+getDayType(ds):"🔒 לחץ לחסימת התאריך"}
              style={{borderRadius:9,padding:"5px 3px",textAlign:"center",cursor:"pointer",
                background:booked?"#1a1a2e":isToday?"#f0eee8":holiday&&!booked?"#f3e8ff":"transparent",
                border:isToday&&!booked?"2px solid #c8b898":holiday&&!booked?"2px solid #c4b5fd":"2px solid transparent",
                minHeight:46,transition:"opacity .15s"}}
              onMouseEnter={e=>{if(booked)e.currentTarget.style.opacity=".8";}}
              onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
              <div style={{fontSize:13,fontWeight:isToday?800:400,color:booked?"#fff":holiday?"#7c3aed":"#3d2c1e"}}>{d}</div>
              {booked
                ?<div style={{fontSize:9,color:booked[0]._blocked?"#ffccbc":"#f4c26a",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",padding:"0 2px"}}>{booked[0].name}</div>
                :<div style={{fontSize:9,color:holiday?"#7c3aed":"#b0a090"}}>{holiday?"חג | ":""}{fm(p)}</div>
              }
            </div>
          );
        })}
      </div>
      <div style={{marginTop:14,paddingTop:12,borderTop:"1px solid #f0eee8",display:"flex",gap:20,flexWrap:"wrap"}}>
        {[["#1a1a2e","תפוס"],["#f3e8ff","חג"],["#f0eee8","היום"],["transparent","פנוי + מחיר"]].map(([c,l])=>(
          <div key={l} style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{width:14,height:14,borderRadius:4,background:c,border:c==="transparent"?"1.5px solid #c8b898":"none"}}/>
            <span style={{fontSize:12,color:"#8a7e6e"}}>{l}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

    if(n===0) return "אפס";
    let result="";
    if(n>=1000){result+=ones[Math.floor(n/1000)]+" אלף ";n%=1000;}
    if(n>=100){result+=ones[Math.floor(n/100)]+" מאות ";n%=100;}
    if(n>=20){result+=tens[Math.floor(n/10)]+" ";n%=10;}
    if(n>0) result+=ones[n]+" ";

              {l:"תוספת יציאה ראשון",p:fm(getActivePrices().sundayExtra)},
              {l:"אורח נוסף (מעל 2)",p:`${fm(getActivePrices().extraGuest)} / אדם`},

              <div style={{fontSize:13,color:"#7a6a58"}}>⏰ כניסה: 13:00 · יציאה: 11:00</div>
              <div style={{fontSize:13,color:"#7a6a58",marginTop:3}}>📞 050-410-3353 יעקב</div>

            </div>
          </div>
        </div>

            {l:"מאושרות",v:confirmed.length,icon:"📋",s:`${bookings.filter(b=>b.status==="pending").length} ממתינות`},
            {l:"לילות מוזמנים",v:totalNights,icon:"🌙",s:'סה"כ'},

                                {b.receiptIssued&&<span title="הונפקה קבלה" style={{fontSize:10,background:"#e8f5e9",color:"#2e7d32",borderRadius:5,padding:"1px 5px",fontWeight:700,cursor:"default"}}>🧾</span>}
                                {(()=>{
                                  const allSent=b.sentConfirm&&(b.sentReminder||b.sentAutoReminder)&&(b.sentReview||b.sentAutoReview);
                                  const noneSent=!b.sentConfirm&&!b.sentReminder&&!b.sentReview;
                                  if(noneSent) return null;
                                  const tip=`אישור:${b.sentConfirm?"✓":"✗"} | תזכורת:${b.sentReminder?"✓":"✗"} | ביקורת:${b.sentReview?"✓":"✗"} | תז'אוטו:${b.sentAutoReminder?"✓":"✗"} | ביק'אוטו:${b.sentAutoReview?"✓":"✗"}`;
                                  return <span title={tip} style={{fontSize:10,background:allSent?"#e8f5e9":"#fff3e0",color:allSent?"#2e7d32":"#e65100",borderRadius:5,padding:"1px 5px",fontWeight:700,cursor:"default"}}>

                                })()}

                          <td style={{padding:"8px 12px",color:"#6a5e50",whiteSpace:"nowrap"}}>{fd(b.checkin)}</td>

                          <td style={{padding:"11px 12px"}}>
                            <span style={{background:sc.bg,color:sc.text,borderRadius:8,padding:"3px 9px",fontSize:11,fontWeight:700,display:"inline-flex",alignItems:"center",gap:4}}>
                              <span style={{width:6,height:6,borderRadius:"50%",background:sc.dot,display:"inline-block"}}/>
                              {STATUS[getDisplayStatus(b)]}
                            </span>
                          </td>
                          <td style={{padding:"11px 12px",fontWeight:700,color:"#1a1a2e"}}>{fm(b.total||0)}</td>
                          <td style={{padding:"11px 12px",color:"#2e7d32",fontWeight:600}}>{fm((b.paid||0)+(b.deposit||0))}</td>
                          <td style={{padding:"11px 12px",color:bal>0?"#c62828":"#2e7d32",fontWeight:600}}>{fm(bal)}</td>
                          <td className="desktop-actions" style={{padding:"8px 12px"}}>
                            <div style={{display:"flex",gap:4,flexWrap:"nowrap",alignItems:"center"}}>
                              <button onClick={e=>{e.stopPropagation();openEdit(b);}} style={{border:"none",background:"#f0eee8",borderRadius:7,padding:"5px 8px",cursor:"pointer",fontSize:12}} title="עריכה">✏️</button>
                              <button onClick={e=>{e.stopPropagation();setConfirmPopup(b);}} style={{border:"none",background:"#e7f7e7",borderRadius:7,padding:"5px 8px",cursor:"pointer",fontSize:12}} title="אישור הזמנה">✉️</button>
                              <button onClick={e=>{e.stopPropagation();setReminderPopup(b);}} style={{border:"none",background:"#fff8e1",borderRadius:7,padding:"5px 8px",cursor:"pointer",fontSize:12}} title="תזכורת יום לפני">⏰</button>

                            </div>
                          </td>
                        </tr>
                      );
                    })}

                </table>
              </div>
            </div>
          </>

        {/* ── Calendar ── */}

          <>

                style={{padding:"8px 14px",borderRadius:10,border:"1.5px solid #e0d8cc",fontSize:14,fontFamily:"'Heebo',sans-serif",width:"100%",maxWidth:300,background:"#fff",direction:"rtl",boxSizing:"border-box"}}/>
              {calSearch&&(
                <div style={{marginTop:8,background:"#fff",borderRadius:12,boxShadow:"0 4px 16px rgba(0,0,0,.1)",overflow:"hidden"}}>
                  {bookings.filter(b=>(b.name||"").includes(calSearch)||(b.phone||"").includes(calSearch)).slice(0,5).map(b=>(
                    <div key={b.id} onClick={()=>{openEdit(b);setCalSearch("");}}
                      style={{padding:"10px 14px",cursor:"pointer",borderBottom:"1px solid #f0eee8",fontFamily:"'Heebo',sans-serif",display:"flex",justifyContent:"space-between",alignItems:"center"}}
                      onMouseEnter={e=>e.currentTarget.style.background="#f8f4ec"}
                      onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
                      <span style={{fontWeight:700,color:"#1a1a2e"}}>{b.name}</span>
                      <span style={{fontSize:12,color:"#8a7e6e"}}>{fd(b.checkin)} — {fd(b.checkout)}</span>
                    </div>
                  ))}

                </div>
              )}
            </div>
            <CalendarView bookings={bookings} onEdit={openEdit} blockedDates={blockedDates} onToggleBlock={(ds,action)=>{
              if(action==="add"){
                setBlockPopup({date:ds,note:""});

                setUnblockConfirm(ds);
              } else if(action==="remove"){
                const nb=blockedDates.filter(b=>b.date!==ds);
                setBlockedDates(nb);
                saveBlocked(nb);
              }
            }}/>
          </>
        )}

        {/* פופאפ חסימת תאריך מהיומן */}
        {blockPopup&&(
          <div style={{position:"fixed",inset:0,background:"rgba(20,20,35,.55)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}}
            onClick={()=>setBlockPopup(null)}>
            <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:20,padding:"26px 28px",width:"min(340px,92vw)",boxShadow:"0 24px 80px rgba(0,0,0,.22)",direction:"rtl"}}>
              <div style={{fontSize:32,textAlign:"center",marginBottom:8}}>🔒</div>
              <h3 style={{margin:"0 0 4px",textAlign:"center",fontFamily:"'Heebo',sans-serif",color:"#1a1a2e",fontSize:17}}>חסימת תאריך</h3>

                autoFocus
                value={blockPopup.note}
                onChange={e=>setBlockPopup(p=>({...p,note:e.target.value}))}
                onKeyDown={e=>{
                  if(e.key==="Enter"){
                    const nb=[...blockedDates,{date:blockPopup.date,note:blockPopup.note}];
                    setBlockedDates(nb);saveBlocked(nb);setBlockPopup(null);
                  }
                  if(e.key==="Escape") setBlockPopup(null);
                }}

              />
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{

              </div>
            </div>
          </div>

            <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:20,padding:"26px 28px",width:"min(320px,92vw)",boxShadow:"0 24px 80px rgba(0,0,0,.22)",direction:"rtl",textAlign:"center"}}>
              <div style={{fontSize:32,marginBottom:8}}>🔓</div>
              <h3 style={{margin:"0 0 6px",fontFamily:"'Heebo',sans-serif",color:"#1a1a2e",fontSize:17}}>שחרור חסימה</h3>
              <p style={{margin:"0 0 20px",fontFamily:"'Heebo',sans-serif",color:"#8a7e6e",fontSize:13}}>לשחרר את החסימה של {fd(unblockConfirm)}?</p>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{
                  const nb=blockedDates.filter(b=>b.date!==unblockConfirm);
                  setBlockedDates(nb);saveBlocked(nb);setUnblockConfirm(null);
                }} style={{flex:1,padding:"10px",borderRadius:10,border:"none",background:"#c62828",color:"#fff",fontFamily:"'Heebo',sans-serif",fontWeight:800,fontSize:14,cursor:"pointer"}}>שחרר</button>
                <button onClick={()=>setUnblockConfirm(null)} style={{flex:1,padding:"10px",borderRadius:10,border:"none",background:"#f0eee8",color:"#555",fontFamily:"'Heebo',sans-serif",fontWeight:700,fontSize:14,cursor:"pointer"}}>ביטול</button>

            </div>
          </div>

                  <button onClick={()=>{if(!newItem.name.trim())return;

                        {s.amount&&<div style={{fontWeight:800,color:"#1a1a2e",fontFamily:"'Heebo',sans-serif"}}>₪{Number(s.amount).toLocaleString()}</div>}

                          {s.phone&&<button onClick={()=>{const p="972"+(s.phone||"").replace(/\D/g,"").replace(/^0/,"");window.open(`https://api.whatsapp.com/send?phone=${p}`,"_blank");}}
                            style={{...bS("#e7f7e7","#2e7d32"),fontSize:11,padding:"4px 8px"}}>💬</button>}

                  const inv={

                    bookingId:b.id,guestName:b.name,guestPhone:b.phone,
                    guestEmail:b.email||"",checkin:b.checkin,checkout:b.checkout,
                    nights:b.nights||0,total:b.total||0,guestExtra:b.guestExtra||"",

                    paymentMethod:document.getElementById("invPayMethod").value,
                    paymentDate:document.getElementById("invPayDate").value,

                    paymentRef:document.getElementById("invPayRef").value,
                  };
                  saveInvoices([...invoices,inv]);
                  generatePDF(inv,true);
                }} style={{...bS("#f0eee8","#5a4e40"),fontSize:13,padding:"8px 16px"}}>
                  📄 שמור טיוטה — {type==="receipt"?"קבלה":"חשבונית"}
                </button>
              ))}
            </div>

            <div style={{background:"#fff",borderRadius:16,padding:"32px",textAlign:"center",color:"#a09080",fontFamily:"'Heebo',sans-serif",fontSize:14}}>

                      {inv.draft&&(
                        <>
                          <button onClick={()=>{
                            if(!window.confirm("להנפיק כמסמך סופי? לא ניתן לערוך אחר כך.")) return;

              <button onClick={()=>{sendReviewWhatsApp(reviewPopup);markSent(reviewPopup.id,"sentReview");setReviewPopup(null);}}

              <button onClick={()=>{sendReviewEmail(reviewPopup);markSent(reviewPopup.id,"sentReview");setReviewPopup(null);}}

              <button onClick={()=>{sendReviewWhatsApp(reviewPopup);sendReviewEmail(reviewPopup);markSent(reviewPopup.id,"sentReview");setReviewPopup(null);}}

              <button onClick={()=>setReviewPopup(null)}

            <div style={{fontSize:32,marginBottom:8}}>✉️</div>

                {icon:"✉️",label:"אישור הזמנה",color:"#e7f7e7",tc:"#2e7d32",action:()=>{setConfirmPopup(mobileActionMenu);setMobileActionMenu(null);}},
                {icon:"⏰",label:"תזכורת",color:"#fff8e1",tc:"#f57f17",action:()=>{setReminderPopup(mobileActionMenu);setMobileActionMenu(null);}},
                {icon:"⭐",label:"בקשת ביקורת",color:"#f3e5f5",tc:"#7b1fa2",action:()=>{setReviewPopup(mobileActionMenu);setMobileActionMenu(null);}},
                {icon:"🗑️",label:"מחיקה",color:"#fce4ec",tc:"#c62828",action:()=>{setDelC(mobileActionMenu.id);setMobileActionMenu(null);}},
              ].map(({icon,label,color,tc,action})=>(
                <button key={label} onClick={action}
                  style={{background:color,color:tc,border:"none",borderRadius:12,padding:"14px 10px",cursor:"pointer",fontFamily:"'Heebo',sans-serif",fontWeight:700,fontSize:14,display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
                  <span style={{fontSize:24}}>{icon}</span><span>{label}</span>
                </button>
              ))}
            </div>
          </div>
        </div>
      )}

            {/* 🔒 מנהל חסימות */}
      {showBlockedManager&&(
        <div style={{position:"fixed",inset:0,background:"rgba(20,20,35,.55)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{background:"#fff",borderRadius:20,width:"min(480px,96vw)",maxHeight:"90vh",overflowY:"auto",boxShadow:"0 24px 80px rgba(0,0,0,.22)",direction:"rtl",padding:"24px 28px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <h2 style={{margin:0,fontSize:19,fontFamily:"'Heebo',sans-serif",color:"#1a1a2e",fontWeight:800}}>🔒 חסימת תאריכים</h2>
              <button onClick={()=>setShowBlockedManager(false)} style={{border:"none",background:"none",fontSize:22,cursor:"pointer",color:"#aaa"}}>✕</button>
            </div>
            <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
              <input type="date" value={newBlockDate} onChange={e=>setNewBlockDate(e.target.value)}
                style={{padding:"8px 12px",borderRadius:10,border:"1.5px solid #e0d8cc",fontSize:14,flex:1}}/>
              <input value={newBlockNote} onChange={e=>setNewBlockNote(e.target.value)}
                placeholder="סיבה" style={{padding:"8px 12px",borderRadius:10,border:"1.5px solid #e0d8cc",fontSize:14,flex:2,fontFamily:"'Heebo',sans-serif"}}/>
              <button onClick={()=>{
                if(!newBlockDate)return;
                const nb=[...blockedDates,{date:newBlockDate,note:newBlockNote}];
                setBlockedDates(nb);
                saveBlocked(nb).then(()=>loadBlocked().then(d=>{if(d.length>0)setBlockedDates(d);}));
                setNewBlockDate("");setNewBlockNote("");
              }} style={{padding:"8px 16px",borderRadius:10,border:"none",background:"#1a1a2e",color:"#fff",fontFamily:"'Heebo',sans-serif",fontWeight:700,cursor:"pointer"}}>הוסף</button>
            </div>
            {blockedDates.length===0&&<p style={{color:"#a09080",fontFamily:"'Heebo',sans-serif",fontSize:14}}>אין תאריכים חסומים</p>}
            {[...blockedDates].sort((a,b)=>a.date.localeCompare(b.date)).map((bd,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid #f0eee8"}}>
                <div>
                  <div style={{fontWeight:700,color:"#1a1a2e",fontFamily:"'Heebo',sans-serif"}}>{fd(bd.date)}</div>
                  {bd.note&&<div style={{fontSize:12,color:"#8a7e6e",fontFamily:"'Heebo',sans-serif"}}>{bd.note}</div>}
                </div>
                <button onClick={()=>{const nb=blockedDates.filter((_,j)=>j!==i);setBlockedDates(nb);saveBlocked(nb).then(()=>loadBlocked().then(d=>setBlockedDates(d)));}}
                  style={{border:"none",background:"#fce4ec",borderRadius:7,padding:"5px 10px",cursor:"pointer",color:"#c62828",fontFamily:"'Heebo',sans-serif",fontWeight:700}}>הסר</button>
              </div>
            ))}
          </div>
        </div>
      )}

      {delC&&(
        <div style={{position:"fixed",inset:0,background:"rgba(20,20,35,.5)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{background:"#fff",borderRadius:16,padding:26,textAlign:"center",maxWidth:280,boxShadow:"0 16px 60px rgba(0,0,0,.2)"}}>
            <div style={{fontSize:34,marginBottom:8}}>🗑️</div>
            <h3 style={{margin:"0 0 6px"}}>מחיקת הזמנה</h3>
            <p style={{color:"#6a5e50",margin:"0 0 16px",fontSize:13}}>פעולה זו אינה הפיכה.</p>
            <div style={{display:"flex",gap:8,justifyContent:"center"}}>
              <button onClick={()=>deleteB(delC)} style={bS("#c62828","#fff")}>מחיקה</button>
              <button onClick={()=>setDelC(null)} style={bS("#f0eee8","#555")}>ביטול</button>
            </div>
          </div>
        </div>
      )}

      {showTrash&&(
        <div style={{position:"fixed",inset:0,background:"rgba(20,20,35,.6)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{background:"#fff",borderRadius:20,width:"min(700px,96vw)",maxHeight:"85vh",overflowY:"auto",boxShadow:"0 24px 80px rgba(0,0,0,.25)",direction:"rtl",padding:"24px 28px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <h2 style={{margin:0,fontSize:18,fontFamily:"'Heebo',sans-serif",color:"#c62828",fontWeight:800}}>🗑️ סל מחזור ({trash.length})</h2>
              <button onClick={()=>setShowTrash(false)} style={{border:"none",background:"none",fontSize:22,cursor:"pointer",color:"#aaa"}}>✕</button>
            </div>
            {trash.length===0?<p style={{color:"#aaa",textAlign:"center",fontFamily:"'Heebo',sans-serif"}}>סל המחזור ריק</p>:(
              <>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,fontFamily:"'Heebo',sans-serif"}}>
                <thead>
                  <tr style={{background:"#fce4ec"}}>
                    {["סוג","שם / מייל","טלפון","תאריך מחיקה",""].map(h=><th key={h} style={{padding:"8px 10px",textAlign:"right",fontWeight:700,color:"#c62828",borderBottom:"1.5px solid #f8bbd0"}}>{h}</th>)}
                  </tr>
                </thead>
                <tbody>
                  {trash.map((item,i)=>(
                    <tr key={i} style={{borderBottom:"1px solid #f4f0ea"}}>
                      <td style={{padding:"8px 10px"}}>
                        <span style={{background:item._type==="booking"?"#e8f5e9":item._type==="guest"?"#fff8e1":"#e3f2fd",color:item._type==="booking"?"#2e7d32":item._type==="guest"?"#f57f17":"#1565c0",borderRadius:6,padding:"2px 8px",fontSize:12,fontWeight:700}}>
                          {item._type==="booking"?"📋 הזמנה":item._type==="guest"?"👤 אורח":"👤 מתעניין"}
                        </span>
                      </td>
                      <td style={{padding:"8px 10px",color:"#1a1a2e"}}>{item.name||item.email||"—"}</td>
                      <td style={{padding:"8px 10px",color:"#555",direction:"ltr"}}>{item.phone||"—"}</td>
                      <td style={{padding:"8px 10px",color:"#888"}}>{item._deletedAt}</td>
                      <td style={{padding:"8px 10px",display:"flex",gap:4}}>
                        <button onClick={()=>{
                          const restored={...item};
                          delete restored._type;delete restored._deletedAt;
                          if(item._type==="booking"){
                            const updated=[...bookings,restored];
                            setBookings(updated);syncSave(updated);
                          } else if(item._type==="guest"){
                            const updated=[...manualGuests,restored];
                            saveManualGuests(updated);
                          } else {
                            const updated=[...inquiryLeads,restored];
                            setInquiryLeads(updated);
                            try{localStorage.setItem("shirat_leads",JSON.stringify(updated));}catch(e){}
                          }
                          const newTrash=trash.filter((_,j)=>j!==i);
                          setTrash(newTrash);
                          try{localStorage.setItem("shirat_trash",JSON.stringify(newTrash));}catch(e){}
                          syncTrashToSheets(newTrash);
                        }} style={{border:"none",background:"#e8f5e9",color:"#2e7d32",borderRadius:6,padding:"3px 8px",cursor:"pointer",fontSize:12}}>שחזר</button>
                        <button onClick={()=>{
                          if(!confirm("למחוק לצמיתות?")){return;}
                          const newTrash=trash.filter((_,j)=>j!==i);
                          setTrash(newTrash);
                          try{localStorage.setItem("shirat_trash",JSON.stringify(newTrash));}catch(e){}
                          syncTrashToSheets(newTrash);
                        }} style={{border:"none",background:"#fce4ec",color:"#c62828",borderRadius:6,padding:"3px 8px",cursor:"pointer",fontSize:12}}>מחק</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
              <div style={{marginTop:14,display:"flex",gap:8}}>
                <button onClick={()=>{
                  if(!confirm("לרוקן את סל המחזור לצמיתות?")){return;}
                  setTrash([]);
                  try{localStorage.removeItem("shirat_trash");}catch(e){}
                  syncTrashToSheets([]);
                }} style={{...bS("#fce4ec","#c62828"),fontSize:13}}>🗑️ רוקן סל</button>
              </div>
              </>
            )}
          </div>
        </div>
      )}
      {showLeads&&(
        <div style={{position:"fixed",inset:0,background:"rgba(20,20,35,.55)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{background:"#fff",borderRadius:20,width:"min(500px,96vw)",maxHeight:"80vh",overflowY:"auto",boxShadow:"0 24px 80px rgba(0,0,0,.22)",direction:"rtl",padding:"24px 28px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <h2 style={{margin:0,fontSize:18,fontFamily:"'Heebo',sans-serif",color:"#1a1a2e",fontWeight:800}}>📋 רשימת מתעניינים</h2>
              <button onClick={()=>setShowLeads(false)} style={{border:"none",background:"none",fontSize:22,cursor:"pointer",color:"#aaa"}}>✕</button>
            </div>
            {inquiryLeads.length===0?<p style={{color:"#aaa",textAlign:"center",fontFamily:"'Heebo',sans-serif"}}>אין מתעניינים עדיין</p>:(
              <>
              <div style={{display:"flex",gap:8,marginBottom:8,fontSize:12,color:"#888",fontFamily:"'Heebo',sans-serif"}}>
                <label style={{cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
                  <input type="checkbox" onChange={e=>{
                    const all=e.target.checked;
                    setInquiryLeads(prev=>prev.map(l=>({...l,selected:all})));
                  }}/> בחר הכל
                </label>
              </div>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,fontFamily:"'Heebo',sans-serif"}}>
                <thead>
                  <tr style={{background:"#f8f4ec"}}>
                    {["","מייל","טלפון","תאריך",""].map((h,i)=><th key={i} style={{padding:"8px 10px",textAlign:"right",fontWeight:700,color:"#5a4e40",borderBottom:"1.5px solid #eee6d8"}}>{h}</th>)}
                  </tr>
                </thead>
                <tbody>
                  {inquiryLeads.map((l,i)=>(
                    <tr key={i} style={{borderBottom:"1px solid #f4f0ea",background:l.selected?"#f0f7ee":"transparent"}}>
                      <td style={{padding:"8px 6px",textAlign:"center"}}>
                        <input type="checkbox" checked={!!l.selected} onChange={e=>{
                          setInquiryLeads(prev=>prev.map((x,j)=>j===i?{...x,selected:e.target.checked}:x));
                        }}/>
                      </td>
                      <td style={{padding:"8px 10px",color:"#1a1a2e",direction:"ltr"}}>{l.email||"—"}</td>
                      <td style={{padding:"8px 10px",color:"#555",direction:"ltr"}}>{l.phone||"—"}</td>
                      <td style={{padding:"8px 10px",color:"#888"}}>{l.date}</td>
                      <td style={{padding:"8px 10px"}}>
                        <button onClick={()=>{
  const updated=inquiryLeads.filter((_,j)=>j!==i);
  setInquiryLeads(updated);
  try{localStorage.setItem("shirat_leads",JSON.stringify(updated));}catch(e){}
  addToTrash(inquiryLeads[i],"lead");
  const cb="cb_dl_"+Math.random().toString(36).slice(2);
  window[cb]=function(){delete window[cb];};
  const s=document.createElement("script");
  s.src=SCRIPT_URL+"?action=saveLeads&leads="+encodeURIComponent(JSON.stringify(updated))+"&authuser=0&callback="+cb+"&t="+Date.now();
  document.head.appendChild(s);
}}
                          style={{border:"none",background:"#fce4ec",color:"#c62828",borderRadius:6,padding:"3px 8px",cursor:"pointer",fontSize:12}}>מחק</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
              <div style={{marginTop:16,background:"#f9f7f3",borderRadius:10,padding:"14px 16px"}}>
                <p style={{margin:"0 0 10px",fontSize:13,fontWeight:700,color:"#1a1a2e",fontFamily:"'Heebo',sans-serif"}}>📢 שלח הודעה לכל המתעניינים</p>
                <textarea id="bulkFreeText" placeholder="כתוב הודעה חופשית לשליחה בWhatsApp לכל המתעניינים..."
                  style={{width:"100%",boxSizing:"border-box",padding:"10px 12px",borderRadius:8,border:"1.5px solid #e0d8cc",fontSize:13,fontFamily:"'Heebo',sans-serif",minHeight:100,resize:"vertical",direction:"rtl",marginBottom:8}}/>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>{
                    const selected=inquiryLeads.filter(l=>l.selected&&l.email);
                    const targets=selected.length>0?selected:inquiryLeads.filter(l=>l.email);
                    if(targets.length===0){alert("אין מיילים לשליחה");return;}
                    const msg=document.getElementById("bulkFreeText").value;
                    if(!msg.trim()){alert("כתוב הודעה לשליחה");return;}
                    const bcc=targets.map(l=>l.email).join(",");
                    window.open("https://mail.google.com/mail/?view=cm&bcc="+encodeURIComponent(bcc)+"&su="+encodeURIComponent("מידע על צימר שירת הציפורים")+"&body="+encodeURIComponent(msg),"_blank");
                  }} style={{...bS("#1a1a2e","#fff"),fontSize:13,flex:1}}>📧 שלח מייל ({(()=>{const s=inquiryLeads.filter(l=>l.selected&&l.email);return s.length>0?s.length:inquiryLeads.filter(l=>l.email).length;})()} נמענים)</button>
                  <button onClick={()=>{
                    const selected=inquiryLeads.filter(l=>l.selected&&l.phone);
                    const targets=selected.length>0?selected:inquiryLeads.filter(l=>l.phone);
                    if(targets.length===0){alert("אין טלפונים לשליחה");return;}
                    const msg=document.getElementById("bulkFreeText").value;
                    if(!msg.trim()){alert("כתוב הודעה לשליחה");return;}
                    targets.forEach((l,i)=>{
                      setTimeout(()=>{
                        const phone="972"+l.phone.replace(/\D/g,"").replace(/^0/,"");
                        window.open("https://api.whatsapp.com/send?phone="+phone+"&text="+encodeURIComponent(msg),"_blank");
                      },i*500);
                    });
                  }} style={{...bS("#25d366","#fff"),fontSize:13,flex:1}}>💬 WhatsApp ({(()=>{const s=inquiryLeads.filter(l=>l.selected&&l.phone);return s.length>0?s.length:inquiryLeads.filter(l=>l.phone).length;})()} נמענים)</button>
                </div>
              </div>
              <div style={{marginTop:10,display:"flex",gap:8,flexWrap:"wrap"}}>
                <button onClick={()=>{
                  const lines=inquiryLeads.filter(l=>l.email).map(l=>l.email).join("\n");
                  navigator.clipboard.writeText(lines).then(()=>alert("המיילים הועתקו ✅"));
                }} style={{...bS("#e8f5e9","#2e7d32"),fontSize:13}}>📋 העתק כל המיילים</button>
                <button onClick={()=>{if(confirm("למחוק את כל הרשימה?")){setInquiryLeads([]);try{localStorage.removeItem("shirat_leads");}catch(e){}}}}
                  style={{...bS("#fce4ec","#c62828"),fontSize:13}}>🗑️ נקה רשימה</button>
              </div>
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
